<h2>答对时的正确反馈</h2>
<p class="subtitle">选择正确答案后的视觉反馈</p>

<div class="options">
  <div class="option" data-choice="stars" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>星星闪烁 ✨</h3>
      <p>正确答案周围冒出闪烁的星星</p>
      <ul>
        <li>✨ 符号从选项周围弹出</li>
        <li>短暂闪烁后消失</li>
        <li>配合选项变绿色</li>
        <li>欢乐有成就感的反馈</li>
      </ul>
    </div>
  </div>

  <div class="option" data-choice="check" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>绿色勾选 ✓</h3>
      <p>选项变为绿色并显示勾选动画</p>
      <ul>
        <li>按钮变为绿色</li>
        <li>显示 ✓ 符号</li>
        <li>简洁直接的反馈</li>
        <li>更成熟简洁的风格</li>
      </ul>
    </div>
  </div>

  <div class="option" data-choice="burst" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>金色爆发 💫</h3>
      <p>选项周围金色光芒爆发</p>
      <ul>
        <li>金色粒子从选项爆发</li>
        <li>配合震动效果</li>
        <li>强烈震撼的成就感</li>
        <li>电影感更强烈</li>
      </ul>
    </div>
  </div>
</div>
