<h2>伤害数字动画</h2>
<p class="subtitle">答对时怪物扣血，数字如何飞入显示</p>

<div class="options">
  <div class="option" data-choice="bounce" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>弹跳飞出 ⭐推荐</h3>
      <p>数字从下方弹跳弹出，然后向上飘散消失</p>
      <ul>
        <li>负数从怪物头顶弹出</li>
        <li>先放大后缩小</li>
        <li>向上飘动并逐渐消失</li>
        <li>卡通风味十足</li>
      </ul>
    </div>
  </div>

  <div class="option" data-choice="impact" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>冲击爆发</h3>
      <p>数字在怪物位置爆发出现，然后快速消散</p>
      <ul>
        <li>数字突然出现并放大</li>
        <li>带有冲击波扩散效果</li>
        <li>更强调打击感</li>
      </ul>
    </div>
  </div>

  <div class="option" data-choice="float" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>轻柔飘浮</h3>
      <p>数字淡入，然后轻柔地向上飘散</p>
      <ul>
        <li>透明度渐变效果</li>
        <li>不夸张，适合简洁风格</li>
        <li>更柔和的视觉反馈</li>
      </ul>
    </div>
  </div>
</div>
