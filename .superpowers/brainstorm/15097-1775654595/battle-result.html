<h2>战斗胜利/失败结算界面</h2>
<p class="subtitle">战斗结束后的结果展示方式</p>

<div class="options">
  <div class="option" data-choice="overlay" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>居中浮层 ⭐推荐</h3>
      <p>结果以大浮层形式居中显示</p>
      <ul>
        <li>胜利：金色光芒 + 🎉 + "太棒了！"</li>
        <li>失败：红色渐变 + 💀 + "再试一次！"</li>
        <li>底部显示获得的奖励（如有）</li>
        <li>单按钮继续</li>
      </ul>
    </div>
  </div>

  <div class="option" data-choice="banner" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>横幅掉落</h3>
      <p>结果以横幅形式从顶部掉落</p>
      <ul>
        <li>横幅动画掉落效果</li>
        <li>更戏剧化的展示</li>
        <li>需要点击关闭</li>
        <li>类似游戏王风格</li>
      </ul>
    </div>
  </div>

  <div class="option" data-choice="modal" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>全屏模态框</h3>
      <p>结果占据整个屏幕</p>
      <ul>
        <li>全屏背景 + 中央内容</li>
        <li>更多空间展示奖励</li>
        <li>包含战斗统计</li>
        <li>更丰富的结算信息</li>
      </ul>
    </div>
  </div>
</div>
